<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>RSA 加密测试</title>
</head>
<body>

<h2>RSA 加密登录测试</h2>

用户名: <input type="text" id="username" value="testuser"><br><br>
密码: <input type="password" id="password" value="123456"><br><br>
<button onclick="login()">登录</button>

<pre id="result"></pre>

<script>
const API = 'http://localhost:3000';

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const result = document.getElementById('result');

  // 1. 获取公钥
  const { publicKey } = await fetch(API + '/rsa/public-key').then(r => r.json());

  // 2. 用公钥加密密码 (Web Crypto API, RSA-OAEP + SHA-256)
  const pem = publicKey.replace(/-----.*-----/g, '').replace(/\s/g, '');
  const der = Uint8Array.from(atob(pem), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('spki', der, { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
  const encrypted = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, key, new TextEncoder().encode(password));
  const base64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));

  // 3. 发送密文到后端解密
  const data = await fetch(API + '/rsa/decrypt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ encrypted: base64 }),
  }).then(r => r.json());

  // 4. 显示结果
  result.textContent =
    '密文: ' + base64 + '\n\n' +
    '解密结果: ' + data.decrypted;
}
</script>

</body>
</html>
