const API = 'http://localhost:3000';
let pubKey = '';

// 获取公钥（复用）
async function getPubKey() {
  if (!pubKey) {
    const res = await fetch(API + '/rsa/public-key');
    pubKey = (await res.json()).publicKey;
  }
  return pubKey;
}

// RSA 加密（复用）
async function encrypt(text) {
  const key = await getPubKey();
  const pem = key.replace(/-----.*-----/g, '').replace(/\s/g, '');
  const der = Uint8Array.from(atob(pem), c => c.charCodeAt(0));
  const ck = await crypto.subtle.importKey('spki', der, { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
  const buf = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, ck, new TextEncoder().encode(text));
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

// 7. WebSocket 私聊
let socket = null;
let myUserId = null;

function appendChat(text, type = 'info', msgId) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.style.margin = '4px 0';
  div.style.color = type === 'sent' ? '#1890ff' : type === 'received' ? '#52c41a' : '#999';
  if (msgId) div.dataset.msgId = msgId;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function appendChatHtml(html, type = 'info', msgId) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.style.margin = '4px 0';
  div.style.color = type === 'sent' ? '#1890ff' : type === 'received' ? '#52c41a' : '#999';
  if (msgId) div.dataset.msgId = msgId;
  div.innerHTML = `[${new Date().toLocaleTimeString()}] ${html}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function connectWs() {
  if (!token) { alert('请先登录'); return; }

  // 从 token 解析 userId（简单的 base64 解码）
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    myUserId = payload.id;
  } catch {}

  socket = io(API, { auth: { token } });

  socket.on('connect', () => {
    document.getElementById('wsStatus').style.background = '#d4edda';
    document.getElementById('wsStatus').textContent = '已连接 (用户ID: ' + myUserId + ')';
    appendChat('已连接到服务器');
  });

  socket.on('connect_error', (err) => {
    document.getElementById('wsStatus').style.background = '#f8d7da';
    document.getElementById('wsStatus').textContent = '连接失败: ' + err.message;
  });

  socket.on('online_users', (users) => {
    document.getElementById('onlineList').textContent = users.length > 0 ? users.join(', ') : '无';
  });

  socket.on('user_online', ({ userId }) => {
    appendChat(`用户 ${userId} 上线`);
    // 刷新在线列表
    const el = document.getElementById('onlineList');
    const current = el.textContent === '无' ? [] : el.textContent.split(', ').map(Number);
    if (!current.includes(userId)) { current.push(userId); el.textContent = current.join(', '); }
  });

  socket.on('user_offline', ({ userId }) => {
    appendChat(`用户 ${userId} 下线`);
    const el = document.getElementById('onlineList');
    const current = el.textContent.split(', ').map(Number).filter(id => id !== userId);
    el.textContent = current.length > 0 ? current.join(', ') : '无';
  });

  socket.on('private_message', (msg) => {
    console.log('收到消息:', msg, 'myUserId:', myUserId, '类型:', typeof msg.senderId, typeof myUserId);
    const isMine = Number(msg.senderId) === Number(myUserId);
    const prefix = `[ID:${msg.id}] ${isMine ? '[我 -> 用户' + msg.receiverId + ']' : '[用户' + msg.senderId + ' -> 我]'}`;

    if (msg.type === 'image') {
      appendChatHtml(`${prefix} <img src="${msg.content}" style="max-width:200px;max-height:200px;cursor:pointer;" onclick="window.open(this.src)">`, isMine ? 'sent' : 'received', msg.id);
    } else if (msg.type === 'file') {
      appendChatHtml(`${prefix} <a href="${msg.content}" target="_blank">[文件] ${msg.content.split('/').pop()}</a>`, isMine ? 'sent' : 'received', msg.id);
    } else {
      appendChat(`${prefix} ${msg.content}`, isMine ? 'sent' : 'received', msg.id);
    }
  });

  socket.on('unread_messages', (grouped) => {
    for (const [senderId, messages] of Object.entries(grouped)) {
      appendChat(`收到来自用户${senderId}的 ${messages.length} 条未读消息`, 'received');
      for (const msg of messages) {
        appendChat(`  [用户${senderId}] ${msg.content}`, 'received');
      }
    }
  });

  socket.on('messages_read', ({ readerId }) => {
    appendChat(`用户${readerId} 已读你的消息`);
  });

  socket.on('message_recall', ({ messageId, senderId }) => {
    // 在 DOM 中找到原消息并替换为"已撤回"
    const el = document.querySelector(`[data-msg-id="${messageId}"]`);
    if (el) {
      el.innerHTML = `[${new Date().toLocaleTimeString()}] [ID:${messageId}] 用户${senderId} 撤回了一条消息`;
      el.style.color = '#999';
      el.style.fontStyle = 'italic';
    } else {
      appendChat(`[系统] 用户${senderId} 撤回了一条消息 (ID:${messageId})`);
    }
  });

  socket.on('group_message', (msg) => {
    const isMine = Number(msg.senderId) === Number(myUserId);
    const prefix = `[群${msg.groupId}][ID:${msg.id}] ${isMine ? '[我]' : '[用户' + msg.senderId + ']'}`;

    if (msg.type === 'image') {
      appendChatHtml(`${prefix} <img src="${msg.content}" style="max-width:200px;max-height:200px;cursor:pointer;" onclick="window.open(this.src)">`, isMine ? 'sent' : 'received', msg.id);
    } else if (msg.type === 'file') {
      appendChatHtml(`${prefix} <a href="${msg.content}" target="_blank">[文件] ${msg.content.split('/').pop()}</a>`, isMine ? 'sent' : 'received', msg.id);
    } else {
      appendChat(`${prefix} ${msg.content}`, isMine ? 'sent' : 'received', msg.id);
    }
  });

  socket.on('group_message_recall', ({ messageId, senderId, groupId }) => {
    const el = document.querySelector(`[data-msg-id="${messageId}"]`);
    if (el) {
      el.innerHTML = `[${new Date().toLocaleTimeString()}] [群${groupId}][ID:${messageId}] 用户${senderId} 撤回了一条消息`;
      el.style.color = '#999';
      el.style.fontStyle = 'italic';
    } else {
      appendChat(`[系统] 群${groupId} 中用户${senderId} 撤回了一条消息 (ID:${messageId})`);
    }
  });

  socket.on('disconnect', () => {
    document.getElementById('wsStatus').style.background = '#eee';
    document.getElementById('wsStatus').textContent = '已断开';
    appendChat('已断开连接');
  });
}

function disconnectWs() {
  if (socket) { socket.disconnect(); socket = null; }
}

function sendMsg() {
  if (!socket) { alert('请先连接 WebSocket'); return; }
  const receiverId = Number(document.getElementById('toUser').value);
  const content = document.getElementById('msgContent').value;
  if (!receiverId || !content) { alert('请输入接收者ID和消息内容'); return; }
  socket.emit('private_message', { receiverId, content, type: 'text' });
  document.getElementById('msgContent').value = '';
}

async function sendFile() {
  if (!socket) { alert('请先连接 WebSocket'); return; }
  const receiverId = Number(document.getElementById('toUser').value);
  if (!receiverId) { alert('请输入接收者ID'); return; }
  const file = document.getElementById('chatFile').files[0];
  if (!file) { alert('请选择文件'); return; }

  // 1. 上传文件
  const form = new FormData();
  form.append('file', file);
  const res = await fetch(API + '/message/upload', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: form,
  });
  const data = await res.json();
  if (data.code !== 200) { alert(data.msg); return; }

  // 2. 发送消息（content=文件URL, type=image/file）
  socket.emit('private_message', {
    receiverId,
    content: data.data.url,
    type: data.data.type,
  });
}

async function recallMsg() {
  if (!token) { alert('请先登录'); return; }
  const messageId = Number(document.getElementById('recallMsgId').value);
  if (!messageId) { alert('请输入消息ID'); return; }
  const res = await fetch(API + '/message/recall', {
    method: 'POST',

    body: JSON.stringify({ messageId }),
  });
  const data = await res.json();
  document.getElementById('out7').textContent = JSON.stringify(data, null, 2);
  // 通过 WebSocket 通知对方，并更新本地 DOM
  if (data.code === 200 && socket) {
    socket.emit('message_recall', { messageId, receiverId: data.data.receiverId });
    const el = document.querySelector(`[data-msg-id="${messageId}"]`);
    if (el) {
      el.innerHTML = `[${new Date().toLocaleTimeString()}] [ID:${messageId}] 你撤回了一条消息`;
      el.style.color = '#999';
      el.style.fontStyle = 'italic';
    } else {
      appendChat(`[系统] 已撤回消息 ID:${messageId}`);
    }
  }
}

async function createGroup() {
  if (!token) { document.getElementById('out8').textContent = '请先登录'; return; }
  const name = document.getElementById('groupName').value;
  const membersStr = document.getElementById('groupMembers').value;
  const members = membersStr ? membersStr.split(',').map(Number).filter(Boolean) : [];
  const res = await fetch(API + '/group/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ name, members }),
  });
  document.getElementById('out8').textContent = JSON.stringify(await res.json(), null, 2);
}

function sendGroupMsg() {
  if (!socket) { alert('请先连接 WebSocket'); return; }
  const groupId = Number(document.getElementById('groupId').value);
  const content = document.getElementById('groupMsgContent').value;
  if (!groupId || !content) { alert('请输入群ID和消息内容'); return; }
  socket.emit('group_message', { groupId, content, type: 'text' });
  document.getElementById('groupMsgContent').value = '';
}

async function recallGroupMsg() {
  if (!token) { alert('请先登录'); return; }
  const messageId = Number(document.getElementById('groupRecallMsgId').value);
  if (!messageId) { alert('请输入消息ID'); return; }
  const res = await fetch(API + '/group/recall', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ messageId }),
  });
  const data = await res.json();
  document.getElementById('out8').textContent = JSON.stringify(data, null, 2);
  if (data.code === 200 && socket) {
    socket.emit('group_message_recall', { messageId, groupId: data.data.groupId });
    const el = document.querySelector(`[data-msg-id="${messageId}"]`);
    if (el) {
      el.innerHTML = `[${new Date().toLocaleTimeString()}] [群${data.data.groupId}][ID:${messageId}] 你撤回了一条消息`;
      el.style.color = '#999';
      el.style.fontStyle = 'italic';
    }
  }
}
